services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autotuner-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQLSERVER_PASSWORD:-YourStrong!Passw0rd}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # POC placeholders for services (implemented later)
  collector:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.collector
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - SQLSERVER_HOST=sqlserver
      - SQLSERVER_PORT=1433
      - SQLSERVER_USER=sa
      - SQLSERVER_PASSWORD=${SQLSERVER_PASSWORD:-YourStrong!Passw0rd}
      - SQLSERVER_DATABASE=AutotunerDemo

  recommender:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.recommender
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - SQLSERVER_HOST=sqlserver
      - SQLSERVER_PORT=1433
      - SQLSERVER_USER=sa
      - SQLSERVER_PASSWORD=${SQLSERVER_PASSWORD:-YourStrong!Passw0rd}
      - SQLSERVER_DATABASE=AutotunerDemo
