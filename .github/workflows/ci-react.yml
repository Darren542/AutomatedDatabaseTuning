name: CI (React)

on:
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/ci-react.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: dashboard/web
        run: npm ci
        # run: npm install # if we don't want to save package-lock.json
      - name: Build
        working-directory: dashboard/web
        run: npm run build
